<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama-Flask-Demo</title>

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- KaTeX -->
    <link href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css" rel="stylesheet">
    <!-- highlight.js テーマ -->
    <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/androidstudio.min.css" rel="stylesheet">

    <style>
        :root {
            --c-sage: #ccd5ae;
            --c-lightsage: #e9edc9;
            --c-cream: #fefae0;
            --c-sand: #faedcd;
            --c-brown: #d4a373;
        }

        body {
            background-color: var(--c-cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-custom {
            background-color: var(--c-sage);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .navbar-custom .navbar-brand,
        .navbar-custom .nav-link {
            color: #5c4326;
            font-weight: 600;
        }

        .model-select {
            background-color: var(--c-cream);
            border: 2px solid var(--c-brown);
            color: #5c4326;
            font-weight: 600;
            border-radius: 0.6rem;
        }

        .model-select:focus {
            box-shadow: 0 0 0 0.2rem rgba(212, 163, 115, 0.4);
            border-color: var(--c-brown);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 0;
        }

        .chat-bubble {
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;
            margin-bottom: 1rem;
            max-width: 85%;
            word-wrap: break-word;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            line-height: 1.6;
        }

        .bubble-user {
            background-color: var(--c-brown);
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 0.2rem;
            white-space: pre-wrap;
        }

        .bubble-ai {
            background-color: var(--c-lightsage);
            color: #3d3122;
            margin-right: auto;
            border-bottom-left-radius: 0.2rem;
        }

        .bubble-error {
            background-color: #f8d7da;
            color: #842029;
            margin-right: auto;
            white-space: pre-wrap;
        }

        .bubble-role {
            font-size: 0.75rem;
            font-weight: 700;
            opacity: 0.8;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        /* ===== Markdown 表示用スタイル ===== */
        .md-content > *:first-child { margin-top: 0; }
        .md-content > *:last-child { margin-bottom: 0; }

        .md-content h1,
        .md-content h2,
        .md-content h3,
        .md-content h4,
        .md-content h5,
        .md-content h6 {
            font-weight: 700;
            line-height: 1.3;
            margin: 1rem 0 0.6rem;
            color: #5c4326;
            border-bottom: 1px solid rgba(92, 67, 38, 0.15);
            padding-bottom: 0.2rem;
        }
        .md-content h1 { font-size: 1.6rem; }
        .md-content h2 { font-size: 1.4rem; }
        .md-content h3 { font-size: 1.2rem; }
        .md-content h4 { font-size: 1.05rem; }
        .md-content h5 { font-size: 0.95rem; }
        .md-content h6 { font-size: 0.85rem; }

        .md-content strong { font-weight: 700; }
        .md-content em { font-style: italic; }

        .md-content p { margin: 0.5rem 0; }

        .md-content ul,
        .md-content ol {
            margin: 0.5rem 0;
            padding-left: 1.6rem;
        }
        .md-content li { margin: 0.2rem 0; }

        .md-content a {
            color: #9a6a2e;
            text-decoration: underline;
        }

        .md-content blockquote {
            border-left: 4px solid var(--c-brown);
            background-color: rgba(254, 250, 224, 0.6);
            margin: 0.6rem 0;
            padding: 0.4rem 0.9rem;
            color: #5c4326;
            border-radius: 0 0.4rem 0.4rem 0;
        }

        /* インラインコード */
        .md-content code:not(pre code) {
            background-color: rgba(212, 163, 115, 0.22);
            color: #7a4e1a;
            padding: 0.12rem 0.4rem;
            border-radius: 0.35rem;
            font-size: 0.88em;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }

        /* コードブロック */
        .md-content pre {
            background-color: #282c34;
            border-radius: 0.7rem;
            padding: 0;
            margin: 0.7rem 0;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
        .md-content pre code {
            display: block;
            padding: 1rem 1.1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            line-height: 1.5;
            background: transparent;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #21252b;
            color: #b9c0cc;
            padding: 0.35rem 0.9rem;
            font-size: 0.72rem;
            font-family: monospace;
        }
        .copy-btn {
            background: transparent;
            border: 1px solid #4a5160;
            color: #b9c0cc;
            border-radius: 0.4rem;
            font-size: 0.7rem;
            padding: 0.1rem 0.5rem;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .copy-btn:hover {
            background-color: #3a4150;
            color: #fff;
        }

        .md-content table {
            border-collapse: collapse;
            margin: 0.7rem 0;
            width: auto;
        }
        .md-content th,
        .md-content td {
            border: 1px solid rgba(92, 67, 38, 0.25);
            padding: 0.4rem 0.7rem;
        }
        .md-content th {
            background-color: var(--c-sage);
            color: #5c4326;
        }

        .md-content hr {
            border: none;
            border-top: 1px solid rgba(92, 67, 38, 0.2);
            margin: 0.8rem 0;
        }

        .katex-display {
            margin: 0.7rem 0;
            overflow-x: auto;
            overflow-y: hidden;
        }

        /* ===== 入力エリア ===== */
        .input-area {
            background-color: var(--c-sand);
            border-top: 2px solid var(--c-brown);
            padding: 1rem 0;
        }

        .prompt-textarea {
            background-color: var(--c-cream);
            border: 2px solid var(--c-sage);
            border-radius: 0.8rem;
            resize: none;
            color: #3d3122;
        }
        .prompt-textarea:focus {
            box-shadow: 0 0 0 0.2rem rgba(204, 213, 174, 0.5);
            border-color: var(--c-brown);
        }

        .btn-send {
            background-color: var(--c-brown);
            border: none;
            color: #fff;
            border-radius: 0.8rem;
            font-weight: 600;
            padding: 0 1.4rem;
            transition: background-color 0.2s ease;
        }
        .btn-send:hover:not(:disabled) {
            background-color: #b9874f;
            color: #fff;
        }
        .btn-send:disabled {
            background-color: #d8c4ac;
            cursor: not-allowed;
        }

        .hint-text {
            font-size: 0.78rem;
            color: #8a6d4b;
            margin-top: 0.4rem;
        }

        .empty-state {
            text-align: center;
            color: #b09a7c;
            margin-top: 3rem;
        }
        .empty-state i { font-size: 3.5rem; }

        .typing-dots span { animation: blink 1.2s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-robot"></i> Ollama-Flask-Demo
            </span>
        <div class="d-flex align-items-center gap-2">
            <label for="modelSelect" class="nav-link mb-0">
                <i class="bi bi-cpu"></i> モデル
            </label>
            <select id="modelSelect" class="form-select form-select-sm model-select" style="width: auto;">
                {% for m in models %}
                <option value="{{ m }}" {% if m == default_model %}selected{% endif %}>{{ m }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
</nav>

<div class="container chat-container" id="chatContainer">
    <div class="empty-state" id="emptyState">
        <i class="bi bi-chat-dots"></i>
        <p class="mt-3">メッセージを入力して会話を始めましょう</p>
    </div>
</div>

<div class="input-area">
    <div class="container">
        <div class="d-flex gap-2 align-items-end">
            <div class="flex-grow-1">
                    <textarea
                            id="promptInput"
                            class="form-control prompt-textarea"
                            rows="2"
                            placeholder="メッセージを入力... (Ctrl + Enter で送信)"></textarea>
            </div>
            <button id="sendBtn" class="btn btn-send" disabled style="height: 62px;">
                <i class="bi bi-send-fill"></i> 送信
            </button>
        </div>
        <div class="hint-text">
            <i class="bi bi-info-circle"></i> Ctrl + Enter で送信できます
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<!-- Markdown / ハイライト / 数式 / サニタイズ -->
<script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/contrib/auto-render.min.js"></script>

<script>
    const chatContainer = document.getElementById("chatContainer");
    const emptyState = document.getElementById("emptyState");
    const promptInput = document.getElementById("promptInput");
    const sendBtn = document.getElementById("sendBtn");
    const modelSelect = document.getElementById("modelSelect");

    // marked の設定（コードブロックに highlight.js を適用）
    marked.setOptions({
        breaks: true,
        gfm: true,
        highlight: function (code, lang) {
            if (lang && hljs.getLanguage(lang)) {
                try {
                    return hljs.highlight(code, { language: lang }).value;
                } catch (e) {}
            }
            return hljs.highlightAuto(code).value;
        }
    });

    // Markdown -> サニタイズ済み HTML
    function renderMarkdown(text) {
        const rawHtml = marked.parse(text);
        return DOMPurify.sanitize(rawHtml);
    }

    // コードブロックにヘッダー（言語名 + コピーボタン）を付与
    function decorateCodeBlocks(container) {
        container.querySelectorAll("pre > code").forEach((codeEl) => {
            const pre = codeEl.parentElement;
            if (pre.dataset.decorated) return;
            pre.dataset.decorated = "1";

            // 言語名を取得（class="language-xxx" から）
            let lang = "";
            codeEl.classList.forEach((c) => {
                if (c.startsWith("language-")) lang = c.replace("language-", "");
            });

            // ここで highlight.js を後がけする
            if (lang && hljs.getLanguage(lang)) {
                const result = hljs.highlight(codeEl.textContent, { language: lang });
                codeEl.innerHTML = result.value;
            } else {
                const result = hljs.highlightAuto(codeEl.textContent);
                codeEl.innerHTML = result.value;
                if (!lang) lang = result.language || "code";
            }
            codeEl.classList.add("hljs");

            // ヘッダー（言語名 + コピーボタン）
            const header = document.createElement("div");
            header.className = "code-header";

            const langSpan = document.createElement("span");
            langSpan.textContent = lang || "code";

            const copyBtn = document.createElement("button");
            copyBtn.className = "copy-btn";
            copyBtn.innerHTML = '<i class="bi bi-clipboard"></i> Copy';
            copyBtn.addEventListener("click", () => {
                navigator.clipboard.writeText(codeEl.textContent).then(() => {
                    copyBtn.innerHTML = '<i class="bi bi-check2"></i> Copied';
                    setTimeout(() => {
                        copyBtn.innerHTML = '<i class="bi bi-clipboard"></i> Copy';
                    }, 1500);
                });
            });

            header.appendChild(langSpan);
            header.appendChild(copyBtn);
            pre.insertBefore(header, codeEl);
        });
    }

    // KaTeX による数式描画
    function renderMath(container) {
        renderMathInElement(container, {
            delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "\\[", right: "\\]", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\(", right: "\\)", display: false }
            ],
            throwOnError: false
        });
    }

    function updateSendState() {
        sendBtn.disabled = promptInput.value.trim() === "";
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeEmptyState() {
        if (emptyState && emptyState.parentNode) {
            emptyState.remove();
        }
    }

    function addBubble(text, role) {
        removeEmptyState();
        const bubble = document.createElement("div");
        bubble.className = "chat-bubble " + (
            role === "user" ? "bubble-user" :
                role === "error" ? "bubble-error" : "bubble-ai"
        );

        const roleLabel = document.createElement("div");
        roleLabel.className = "bubble-role";
        if (role === "user") {
            roleLabel.innerHTML = '<i class="bi bi-person-fill"></i> You';
        } else if (role === "error") {
            roleLabel.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Error';
        } else {
            roleLabel.innerHTML = '<i class="bi bi-robot"></i> ' + modelSelect.value;
        }

        const content = document.createElement("div");

        if (role === "ai") {
            // AI 応答のみ Markdown + 数式 + ハイライトを適用
            content.className = "md-content";
            content.innerHTML = renderMarkdown(text);
            decorateCodeBlocks(content);
            renderMath(content);
        } else {
            // ユーザー入力・エラーはプレーン表示
            content.textContent = text;
        }

        bubble.appendChild(roleLabel);
        bubble.appendChild(content);
        chatContainer.appendChild(bubble);
        scrollToBottom();
    }

    function addTypingIndicator() {
        removeEmptyState();
        const bubble = document.createElement("div");
        bubble.className = "chat-bubble bubble-ai";
        bubble.innerHTML =
            '<div class="bubble-role"><i class="bi bi-robot"></i> ' + modelSelect.value + '</div>' +
            '<div class="typing-dots"><span>●</span><span>●</span><span>●</span></div>';
        chatContainer.appendChild(bubble);
        scrollToBottom();
        return bubble;
    }

    async function sendMessage() {
        const prompt = promptInput.value.trim();
        if (prompt === "") return;

        addBubble(prompt, "user");
        promptInput.value = "";
        updateSendState();

        const typing = addTypingIndicator();

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    prompt: prompt,
                    model: modelSelect.value
                })
            });

            const data = await res.json();
            typing.remove();

            if (!res.ok) {
                addBubble(data.error || "エラーが発生しました", "error");
            } else {
                addBubble(data.response || "(空の応答)", "ai");
            }
        } catch (err) {
            typing.remove();
            addBubble("通信エラー: " + err.message, "error");
        }
    }

    promptInput.addEventListener("input", updateSendState);

    promptInput.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.key === "Enter") {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener("click", sendMessage);
    updateSendState();
</script>
</body>
</html>
